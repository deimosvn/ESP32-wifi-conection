<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            padding: 20px 10px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .tab.active, .tab:hover {
            background: rgba(0,210,255,0.1);
            border-color: #00d2ff;
            color: #00d2ff;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .section h2 {
            font-size: 13px;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .row:last-child { border-bottom: none; }
        .row .k { color: #888; }
        .row .v { color: #ddd; font-weight: 500; text-align: right; }
        .bar-container {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.5s;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size:40px">&#9881;</div>
        <h1>ESP32 Detalle Completo</h1>
    </div>

    <div class="tabs">
        <a class="tab" href="/">Dashboard</a>
        <a class="tab active" href="/info">ESP32 Info</a>
    </div>

    <div id="content"><div style="text-align:center;color:#555;padding:30px">Cargando datos del ESP32...</div></div>

    <p class="footer">ESP32 Captive Portal Demo</p>

    <script>
    async function load() {
        try {
            const res = await fetch('/api/info');
            const d = await res.json();
            const cats = {
                'Procesador': ['Chip Model','Chip Revision','CPU Cores','CPU Freq','SDK Version','Chip Temp'],
                'Memoria': ['Heap Size','Free Heap','Min Free Heap','PSRAM Size','Free PSRAM'],
                'Flash / Storage': ['Flash Size','Flash Speed','Sketch Size','Free Sketch','SPIFFS Total','SPIFFS Used'],
                'Red AP': ['AP SSID','AP IP','AP MAC','Clients'],
                'WiFi Hogar': ['STA SSID','STA Status','STA IP','STA Gateway','STA DNS','STA MAC','STA RSSI','STA Channel','STA BSSID'],
                'Sistema': ['Uptime']
            };
            let html = '';
            for (const [cat, keys] of Object.entries(cats)) {
                let rows = '';
                for (const k of keys) {
                    if (d[k] !== undefined) {
                        rows += '<div class="row"><span class="k">' + k + '</span><span class="v">' + d[k] + '</span></div>';
                    }
                }
                // Barras de uso para memoria y storage
                let bars = '';
                if (cat === 'Memoria' && d['Heap Size'] && d['Free Heap']) {
                    const total = parseInt(d['Heap Size']);
                    const free = parseInt(d['Free Heap']);
                    if (total > 0) {
                        const pct = Math.round(((total - free) / total) * 100);
                        bars += '<div style="font-size:11px;color:#888;margin-top:6px">Heap usado: ' + pct + '%</div><div class="bar-container"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
                    }
                }
                if (cat === 'Flash / Storage' && d['SPIFFS Total'] && d['SPIFFS Used']) {
                    const total = parseInt(d['SPIFFS Total']);
                    const used = parseInt(d['SPIFFS Used']);
                    if (total > 0) {
                        const pct = Math.round((used / total) * 100);
                        bars += '<div style="font-size:11px;color:#888;margin-top:6px">SPIFFS usado: ' + pct + '%</div><div class="bar-container"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
                    }
                }
                if (rows) html += '<div class="section"><h2>' + cat + '</h2>' + rows + bars + '</div>';
            }
            document.getElementById('content').innerHTML = html;
        } catch(e) {
            document.getElementById('content').innerHTML = '<div style="text-align:center;color:#f44;padding:20px">Error al cargar datos</div>';
        }
    }
    load();
    setInterval(load, 5000);
    </script>
</body>
</html>
